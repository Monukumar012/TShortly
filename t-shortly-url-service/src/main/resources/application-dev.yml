spring:
  datasource:
    url: jdbc:h2:mem:url-db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.use.type.headers: false

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000
    cache:
      type: redis

app:
  kafka:
    topics:
      short-url-events: short-url-events
  url:
    shortening:
      max-attempts: 10
  redis:
    global-ttl-minutes: 60